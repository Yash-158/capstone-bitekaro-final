<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiteKaro — Menu</title>
  <meta name="description" content="Browse the BiteKaro menu with AI-powered recommendations based on your mood.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/kiosk.css">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#1152d4", "accent-gold": "#d4af37", "accent-coral": "#ff6b6b", "accent-teal": "#20b2aa", "background-light": "#f6f6f8", "background-dark": "#101622", "coral": "#FF6B35", "amber": "#FFB300" },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"], "poppins": ["Poppins", "sans-serif"] },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
        },
    }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .shimmer-gold { background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent); border: 1px solid rgba(212, 175, 55, 0.3); }
    .food-gradient { background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0) 100%); }
    .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .hidden { display: none !important; }
  </style>
  <link rel="stylesheet" href="css/kiosk.css">
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display relative pb-32">

  <!-- Sticky Top Navbar -->
  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm px-6 py-4 flex flex-col gap-4" id="navbar">
    <div class="flex items-center justify-between gap-6">
      <div class="flex items-center gap-3">
        <a href="index.html" class="bg-white rounded-full p-2 shadow-inner border border-slate-100 logo-wrap hover:scale-105 transition-transform">
          <img src="/public/images/logo.png" alt="BiteKaro" class="logo-img" style="height: 48px;" onerror="this.style.display='none'">
        </a>
      </div>
      
      <!-- Mood Strip -->
      <div class="flex items-center gap-2 bg-gradient-to-r from-background-light to-transparent p-2 rounded-lg hidden" id="moodStrip">
        <span class="text-slate-500 text-sm font-medium">Personalised for</span>
        <span class="bg-white shadow-sm px-3 py-1 rounded-full text-sm font-bold flex items-center gap-2 border border-slate-100 cursor-pointer hover:bg-slate-50" id="moodPill"></span>
      </div>

      <div class="flex-1 max-w-2xl">
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-primary/60">search</span>
          </div>
          <input id="searchInput" oninput="searchItems(this.value)" class="block w-full h-12 pl-14 pr-4 bg-primary/5 border-none rounded-full text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-primary/20 transition-all font-display" placeholder="Search for Butter Chicken, Masala Dosa..." type="text"/>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm font-semibold bg-primary/10 text-primary px-3 py-1 rounded-full hidden" id="customerChip"></span>
        <button class="relative bg-primary text-white px-6 py-2.5 rounded-full font-bold flex items-center gap-2 hover:scale-105 transition-transform font-display" onclick="toggleCartSidebar(true)">
          <span class="material-symbols-outlined text-sm">shopping_cart</span>
          <span>Cart</span>
          <span id="cartBadgeHeader" class="absolute -top-1 -right-1 bg-[#FF6B35] text-white text-[10px] size-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm" style="display:none;">0</span>
        </button>
      </div>
    </div>
    
    <!-- Category Filter Tabs -->
    <div class="flex overflow-x-auto gap-3 custom-scrollbar" id="categoryTabs">
      <button class="category-tab active px-6 py-2 rounded-full font-semibold whitespace-nowrap transition-colors bg-white text-primary border-2 border-primary/10 [&.active]:bg-primary [&.active]:text-white [&.active]:border-transparent shadow-sm [&.active]:shadow-md [&.active]:shadow-primary/20 font-display" data-cat="all" onclick="filterByCategory('all', this)">All Dishes</button>
      <button class="category-tab px-6 py-2 rounded-full font-semibold whitespace-nowrap transition-colors bg-white text-primary border-2 border-primary/10 [&.active]:bg-primary [&.active]:text-white [&.active]:border-transparent shadow-sm [&.active]:shadow-md [&.active]:shadow-primary/20 font-display" data-cat="hot_beverages" onclick="filterByCategory('hot_beverages', this)">☕ Hot Drinks</button>
      <button class="category-tab px-6 py-2 rounded-full font-semibold whitespace-nowrap transition-colors bg-white text-primary border-2 border-primary/10 [&.active]:bg-primary [&.active]:text-white [&.active]:border-transparent shadow-sm [&.active]:shadow-md [&.active]:shadow-primary/20 font-display" data-cat="cold_beverages" onclick="filterByCategory('cold_beverages', this)">🧊 Cold Drinks</button>
      <button class="category-tab px-6 py-2 rounded-full font-semibold whitespace-nowrap transition-colors bg-white text-primary border-2 border-primary/10 [&.active]:bg-primary [&.active]:text-white [&.active]:border-transparent shadow-sm [&.active]:shadow-md [&.active]:shadow-primary/20 font-display" data-cat="snacks" onclick="filterByCategory('snacks', this)">🥨 Snacks</button>
      <button class="category-tab px-6 py-2 rounded-full font-semibold whitespace-nowrap transition-colors bg-white text-primary border-2 border-primary/10 [&.active]:bg-primary [&.active]:text-white [&.active]:border-transparent shadow-sm [&.active]:shadow-md [&.active]:shadow-primary/20 font-display" data-cat="meals" onclick="filterByCategory('meals', this)">🍽️ Meals</button>
      <button class="category-tab px-6 py-2 rounded-full font-semibold whitespace-nowrap transition-colors bg-white text-primary border-2 border-primary/10 [&.active]:bg-primary [&.active]:text-white [&.active]:border-transparent shadow-sm [&.active]:shadow-md [&.active]:shadow-primary/20 font-display" data-cat="desserts" onclick="filterByCategory('desserts', this)">🍮 Desserts</button>
    </div>
  </header>

  <main class="w-full max-w-7xl mx-auto pt-4 px-6 pb-20">
    <!-- AI Recommendations Section -->
    <section id="recommendations-section" style="display: none;">
      <div class="rec-section-header">
        <h2>✨ AI Recommendations</h2>
        <span class="mood-chip" id="recoSub">Curated for you</span>
      </div>
      <div id="recommendations-container">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- Main Menu Grid -->
    <section>
      <h2 class="text-xl font-bold text-slate-800 mb-6 font-display">Freshly Prepared For You</h2>
      
      <div class="flex flex-col items-center justify-center py-20" id="menuLoading">
        <div class="spinner border-primary"></div>
        <p class="text-slate-500 font-medium mt-4 font-display">Loading delicious menu...</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="menuGrid">
        <!-- Rendered by JS -->
      </div>
      
      <div class="hidden flex-col items-center justify-center py-20 text-center" id="noResults" style="display: none;">
        <span class="text-6xl mb-4">🔍</span>
        <p class="text-2xl font-bold text-slate-800 mb-2 font-display">No items found</p>
        <p class="text-slate-500 font-display">Try a different search or category tab.</p>
      </div>
    </section>
  </main>



  <!-- Customization Modal & Cart Sidebar left intact using CSS classes defined in kiosk.css -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleCartSidebar(false)"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="sidebar-header">
      <h3>Your Order <span id="sidebarCount" style="color:var(--text-light);font-size:14px;font-weight:400;"></span></h3>
      <button class="sidebar-close" onclick="toggleCartSidebar(false)">✕</button>
    </div>
    <div class="sidebar-items" id="sidebarItems"></div>
    <div class="sidebar-footer" id="sidebarFooter" style="display:none;">
      <div class="sidebar-total">
        <span>Subtotal</span>
        <span class="price" id="sidebarTotal">Rs.0</span>
      </div>
      <button class="sidebar-checkout-btn" onclick="window.location.href='cart.html'">Proceed to Checkout</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script>
    // Link cart badge in app to this new header badge
    document.addEventListener('cartUpdated', () => {
      const cnt = BiteKaroApp.getCartCount();
      const badge = document.getElementById('cartBadgeHeader');
      if(badge) {
        badge.textContent = cnt;
        badge.style.display = cnt > 0 ? 'flex' : 'none';
      }
    });
  </script>
</body>
</html>
