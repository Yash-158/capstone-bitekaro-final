<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>BiteKaro One — Sign In</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Poppins:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dashboard.css">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#f24a0d",
            "background-light": "#f8f6f5",
            "background-dark": "#221510",
            "royal-blue": "#1e3a8a",
            "warm-cream": "#FFFBF5",
          },
          fontFamily: {
            "display": ["Poppins", "Manrope", "sans-serif"],
            "sans": ["Manrope", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
        },
      },
    }
  </script>
  <style>
    body { min-height: max(884px, 100dvh); }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .shake { animation: shake 0.4s ease; }
    .hidden-force { display: none !important; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex min-h-screen w-full flex-col lg:flex-row overflow-hidden">
  
  <!-- Left Side: Information & Branding (Mobile Top) -->
  <div class="relative flex w-full flex-col items-center justify-center bg-gradient-to-br from-[#0D47A1] via-blue-800 to-[#1565C0] p-8 lg:w-1/2 lg:p-16">
    <div class="z-10 flex w-full max-w-md flex-col items-start">
      <div class="mb-6 flex items-center justify-center rounded-2xl bg-white shadow-lg p-2" style="height: 56px;">
        <img src="/public/images/logo.png" alt="BiteKaro" onerror="this.style.display='none'" style="height:100%; object-fit:contain;">
      </div>
      <h2 class="mb-10 text-[10px] font-bold uppercase tracking-[2px] text-white">BUSINESS DASHBOARD</h2>
      
      <div class="space-y-6">
        <div class="flex items-center gap-4">
          <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-white/20">
            <span class="material-symbols-outlined text-sm text-white">check</span>
          </div>
          <p class="text-lg font-medium text-white">AI-Powered Insights</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-white/20">
            <span class="material-symbols-outlined text-sm text-white">check</span>
          </div>
          <p class="text-lg font-medium text-white">Real-time Order Tracking</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-white/20">
            <span class="material-symbols-outlined text-sm text-white">check</span>
          </div>
          <p class="text-lg font-medium text-white">Smart Menu Management</p>
        </div>
      </div>
    </div>
    <div class="absolute inset-0 z-0 opacity-20" data-alt="Abstract geometric blue diagonal pattern background"></div>
  </div>
  
  <!-- Right Side: Login Form -->
  <div class="flex w-full items-center justify-center bg-[#FFFBF5] dark:bg-background-dark p-6 lg:w-1/2">
    <div class="w-full max-w-md">
      <div class="rounded-[20px] bg-white dark:bg-stone-900 p-8 shadow-[0_4px_24px_rgba(21,101,192,0.10)]">
        
        <div class="mb-8 text-center">
          <h1 class="text-[28px] font-bold leading-tight tracking-tight text-[#0D47A1] dark:text-slate-100">Welcome Back</h1>
          <p class="mt-2 text-base text-slate-500 dark:text-slate-400">Sign in to your dashboard</p>
        </div>
        
        <form class="space-y-5" id="loginForm" onsubmit="handleLogin(event)">
          <div class="relative">
            <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
            <div class="group relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
              <input id="loginEmail" class="h-12 w-full rounded-lg border-slate-200 bg-slate-50 pl-10 pr-4 text-slate-900 focus:border-[#FF6B35] focus:ring-[#FF6B35] transition-colors" placeholder="admin@bitekaro.com" type="email" required/>
            </div>
          </div>
          
          <div class="relative">
            <label class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
            <div class="group relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
              <input id="loginPassword" class="h-12 w-full rounded-lg border-slate-200 bg-slate-50 pl-10 pr-10 text-slate-900 focus:border-[#FF6B35] focus:ring-[#FF6B35] transition-colors" placeholder="Enter password" type="password" required/>
              <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none" type="button" onclick="togglePwd()">
                <span class="material-symbols-outlined text-[20px]">visibility</span>
              </button>
            </div>
          </div>
          
          <div id="loginError" class="hidden-force text-red-500 text-sm font-medium pt-1 text-center">Invalid email or password</div>
          
          <button id="loginBtn" class="w-full h-14 rounded-lg bg-gradient-to-r from-[#FF6B35] to-[#FFB300] text-white font-bold text-lg shadow-lg hover:opacity-90 transition-all active:scale-[0.98] mt-2" type="submit">
            Sign In
          </button>
        </form>

        <!-- Demo Access Section -->
        <div class="mt-8 rounded-xl bg-green-50 p-5 border border-green-200">
          <div class="flex items-center gap-2 mb-3">
            <span class="material-symbols-outlined text-green-600">lock_open</span>
            <span class="font-bold text-sm text-green-800">Demo Access</span>
          </div>
          <div class="flex flex-col gap-1 mb-4">
            <div class="flex justify-between text-xs">
              <span class="text-green-700/70">Email:</span>
              <span class="font-medium text-green-900">admin@bitekaro.com</span>
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-green-700/70">Password:</span>
              <span class="font-medium text-green-900">Admin@123</span>
            </div>
          </div>
          <button class="w-full py-2.5 rounded-lg bg-green-600 text-white text-sm font-bold hover:bg-green-700 transition-colors" onclick="fillDemo()">
            Use Demo Credentials
          </button>
        </div>
        
      </div>
    </div>
  </div>
</div>

  <script>
    const API = 'http://localhost:3000/api';

    // Redirect if already logged in
    if (localStorage.getItem('bitekaro_token')) {
      window.location.href = 'index.html';
    }

    function togglePwd() {
      const p = document.getElementById('loginPassword');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function fillDemo() {
      document.getElementById('loginEmail').value = 'admin@bitekaro.com';
      document.getElementById('loginPassword').value = 'Admin@123';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      btn.disabled = true; btn.textContent = 'Signing in...';
      err.style.display = 'none';

      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('bitekaro_token', data.token);
        localStorage.setItem('bitekaro_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        document.getElementById('loginForm').classList.add('shake');
        setTimeout(() => document.getElementById('loginForm').classList.remove('shake'), 500);
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
